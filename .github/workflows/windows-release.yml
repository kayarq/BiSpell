# Build unpackaged WinUI + native DLL on GitHub-hosted Windows runners.
# Produces a zip release asset so contributors need NOT install VS/CMake on C:.
#
# Pipeline (W3 Mandate B):
#   build-windows-x64  → zip artifact
#   smoke-windows-x64  → needs build; extract zip, launch smoke
#   release-windows-x64 → needs smoke green; attach zip to GitHub Release
#
# Trigger: tag v* (e.g. v0.1.4-windows) or manual workflow_dispatch.
name: windows-release

on:
  push:
    tags:
      - "v*-windows"
      - "windows-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version label (e.g. 0.1.4)"
        required: true
        default: "0.1.4"
      create_release:
        description: "Create/update GitHub Release and attach zip"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  build-windows-x64:
    name: WinUI x64 package
    runs-on: windows-latest
    outputs:
      package_name: ${{ steps.zip.outputs.package_name }}
      package_version: ${{ steps.zip.outputs.package_version }}
      release_tag: ${{ steps.rel.outputs.tag }}
      release_title: ${{ steps.rel.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC + CMake env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          ninja --version
          cmake --version
          cl 2>&1 | Select-Object -First 2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify .NET SDK (prefer 8.x)
        shell: pwsh
        run: |
          dotnet --list-sdks
          dotnet --version
          # global.json under windows/app pins 8.x rollForward

      - name: Build native bispell_core.dll
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./windows/app/scripts/build-native.ps1 -Platform x64 -Config Release

      - name: Publish unpackaged WinUI app (self-contained Windows App SDK)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = "dist/BiSpell-win-x64"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $pub = Join-Path (Get-Location) $out
          $pub = [System.IO.Path]::GetFullPath($pub)
          New-Item -ItemType Directory -Force -Path $pub | Out-Null
          Push-Location windows/app
          try {
            $proj = "BiSpell.App/BiSpell.App.csproj"
            Write-Host "dotnet publish -> $pub"
            & dotnet publish $proj -c Release -r win-x64 --self-contained true `
              -p:Platform=x64 `
              -p:WindowsPackageType=None `
              -p:WindowsAppSDKSelfContained=true `
              -p:WindowsAppSdkBootstrapInitialize=false `
              -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=true `
              -p:EnableMsixTooling=true `
              -p:PublishReadyToRun=false `
              -o $pub
            if ($LASTEXITCODE -ne 0) {
              Write-Host "dotnet publish failed ($LASTEXITCODE); trying MSBuild Publish target"
              $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
                -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" |
                Select-Object -First 1
              if (-not $msbuild) { throw "MSBuild not found after dotnet publish failed" }
              & $msbuild $proj /t:Restore,Publish /p:Configuration=Release /p:Platform=x64 `
                /p:RuntimeIdentifier=win-x64 /p:WindowsPackageType=None `
                /p:WindowsAppSDKSelfContained=true /p:WindowsAppSdkBootstrapInitialize=false `
                /p:WindowsAppSdkUndockedRegFreeWinRTInitialize=true /p:SelfContained=true `
                /p:EnableMsixTooling=true /p:PublishDir="$pub\"
              if ($LASTEXITCODE -ne 0) { throw "MSBuild Publish failed" }
            }
            $xaml = Get-ChildItem -Path $pub -Filter "Microsoft.ui.xaml.dll" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1
            $war = Get-ChildItem -Path $pub -Filter "Microsoft.WindowsAppRuntime.dll" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if (-not $xaml) { throw "Publish output missing Microsoft.ui.xaml.dll under $pub" }
            if (-not $war) { throw "Publish output missing Microsoft.WindowsAppRuntime.dll under $pub" }
            Write-Host "Self-contained WASDK OK: $($xaml.FullName)"
          } finally {
            Pop-Location
          }
          # Ensure native DLL is next to BiSpell.App.exe
          $dllCandidates = @(
            "windows/app/native/x64/bispell_core.dll",
            "windows/app/native/bispell_core.dll"
          )
          $dll = $dllCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $dll) { throw "bispell_core.dll missing after native build" }
          Copy-Item -Force $dll (Join-Path $out "bispell_core.dll")
          # Belt-and-suspenders: ship MSVC CRT next to the app (static /MT preferred; this covers dynamic builds).
          $crtCandidates = @()
          if ($env:VCToolsRedistDir) {
            $crtCandidates += (Join-Path $env:VCToolsRedistDir "x64\Microsoft.VC143.CRT")
            $crtCandidates += (Join-Path $env:VCToolsRedistDir "x64\Microsoft.VC142.CRT")
          }
          foreach ($crt in $crtCandidates) {
            if (Test-Path $crt) {
              Write-Host "Copying VC CRT from $crt"
              Copy-Item -Force (Join-Path $crt "*.dll") $out
              break
            }
          }
          # Dictionaries (csproj should copy; re-stage SoT for safety)
          $dictOut = Join-Path $out "Dictionaries"
          New-Item -ItemType Directory -Force -Path $dictOut | Out-Null
          Copy-Item -Force "Sources/BiSpellCore/Resources/Dictionaries/*" $dictOut
          # Tiny launcher readme inside zip
          @"
          BiSpell for Windows (MVP unpackaged build)
          ==========================================

          1. Unzip this folder anywhere (no installer).
          2. Prefer Run-BiSpell.cmd (shows errors). Or double-click BiSpell.App.exe.
          3. If nothing appears: open %TEMP%\BiSpell-startup.log
          4. Open a note, paste text, press Check (or F7), apply suggestions.

          Data: %APPDATA%\BiSpell\ (settings, lexicon, Notes\)

          Requires: Windows 10 1809+ / Windows 11 (x64).
          In-app Notes + spell — not system-wide hotkey/UIA.
          "@ | Set-Content -Encoding UTF8 (Join-Path $out "README-WINDOWS.txt")

      - name: Zip package
        id: zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ver = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.version }}"
          } else {
            "${{ github.ref_name }}" -replace '^v','' -replace '-windows$','' -replace '^windows-',''
          }
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "0.0.0" }
          $name = "BiSpell-$ver-win-x64"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (Test-Path "dist/$name.zip") { Remove-Item "dist/$name.zip" -Force }
          Compress-Archive -Path "dist/BiSpell-win-x64/*" -DestinationPath "dist/$name.zip" -Force
          # Also keep a stable name for artifact download / smoke
          Copy-Item -Force "dist/$name.zip" "dist/BiSpell-win-x64.zip"
          "package_name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "package_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-Item "dist/$name.zip" | Format-List Name, Length, FullName

      - name: Resolve release tag
        id: rel
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ inputs.version }}"
            $tag = "v$ver-windows"
            $title = "BiSpell Windows $ver"
          } else {
            $tag = "${{ github.ref_name }}"
            $title = $tag
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact (zip only — same bytes users download)
        uses: actions/upload-artifact@v4
        with:
          name: BiSpell-win-x64
          path: |
            dist/BiSpell-win-x64.zip
            dist/${{ steps.zip.outputs.package_name }}.zip
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Smoke: exercise the packaged zip on a clean windows-latest agent.
  # Gates release — bad builds never attach as "working".
  # ---------------------------------------------------------------------------
  smoke-windows-x64:
    name: Launch smoke (zip)
    runs-on: windows-latest
    needs: [build-windows-x64]
    steps:
      - name: Checkout (smoke script)
        uses: actions/checkout@v4

      - name: Download package zip artifact
        uses: actions/download-artifact@v4
        with:
          name: BiSpell-win-x64
          path: dist

      - name: Inventory artifact
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist | Format-Table Name, Length, FullName -AutoSize
          if (-not (Test-Path "dist/BiSpell-win-x64.zip")) {
            throw "dist/BiSpell-win-x64.zip missing after artifact download"
          }

      - name: Launch smoke (extract zip, run exe, assert log)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $extract = Join-Path $env:RUNNER_TEMP "bispell-smoke"
          $transcript = Join-Path $env:RUNNER_TEMP "bispell-smoke-transcript.txt"
          & ./windows/app/scripts/smoke-launch.ps1 `
            -ZipPath "dist/BiSpell-win-x64.zip" `
            -ExtractDir $extract `
            -TimeoutSeconds 20 `
            -TranscriptPath $transcript
          if ($LASTEXITCODE -ne 0) { throw "smoke-launch.ps1 failed with exit $LASTEXITCODE" }

      - name: Collect smoke logs
        if: always()
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "smoke-logs"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $pairs = @(
            @{ Src = (Join-Path $env:TEMP "BiSpell-startup.log"); Dst = "BiSpell-startup.log" },
            @{ Src = (Join-Path $env:TEMP "BiSpell-startup.status"); Dst = "BiSpell-startup.status" },
            @{ Src = (Join-Path $env:RUNNER_TEMP "bispell-smoke-transcript.txt"); Dst = "bispell-smoke-transcript.txt" }
          )
          foreach ($p in $pairs) {
            if (Test-Path -LiteralPath $p.Src) {
              Copy-Item -Force -LiteralPath $p.Src (Join-Path $out $p.Dst)
              Write-Host "collected $($p.Dst)"
            } else {
              Write-Host "missing $($p.Src)"
            }
          }
          Get-ChildItem $out -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BiSpell-smoke-logs
          path: ${{ runner.temp }}/smoke-logs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup BiSpell processes
        if: always()
        shell: pwsh
        run: |
          Get-Process -Name "BiSpell.App" -ErrorAction SilentlyContinue |
            ForEach-Object {
              Write-Host "Killing leftover pid=$($_.Id)"
              Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
            }

  # ---------------------------------------------------------------------------
  # Release: only after smoke green. Publishes the same zip artifact.
  # ---------------------------------------------------------------------------
  release-windows-x64:
    name: GitHub Release
    runs-on: windows-latest
    needs: [build-windows-x64, smoke-windows-x64]
    if: |
      always() &&
      needs.build-windows-x64.result == 'success' &&
      needs.smoke-windows-x64.result == 'success' &&
      (github.event_name == 'push' || inputs.create_release == true)
    steps:
      - name: Download package zip artifact
        uses: actions/download-artifact@v4
        with:
          name: BiSpell-win-x64
          path: dist

      - name: Verify release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $name = "${{ needs.build-windows-x64.outputs.package_name }}"
          if (-not (Test-Path "dist/BiSpell-win-x64.zip")) { throw "stable zip missing" }
          if (-not (Test-Path "dist/$name.zip")) { throw "versioned zip missing: dist/$name.zip" }
          Get-ChildItem dist/*.zip | Format-Table Name, Length -AutoSize

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows-x64.outputs.release_tag }}
          name: ${{ needs.build-windows-x64.outputs.release_title }}
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## BiSpell for Windows (MVP)

            Unzip and run **`Run-BiSpell.cmd`** (or `BiSpell.App.exe`). Self-contained Windows App SDK — **no** separate Windows App Runtime install required. No Visual Studio/CMake on your PC.

            | | |
            |--|--|
            | Arch | **x64** |
            | Package | Unpackaged WinUI 3 + `bispell_core.dll` + TR/EN dictionaries |
            | Data | `%APPDATA%\BiSpell\` |
            | CI | Build zip → launch smoke (BISPELL_SMOKE=1) → release only if smoke green |

            ### Smoke test
            1. Run `BiSpell.App.exe`
            2. Open a note / paste: `I recieve mail. merhabaa dünya`
            3. **Check** (or F7) → select typo → **Apply**

            **Includes:** in-app Notes (`%APPDATA%\BiSpell\Notes\`), as-you-type in the note editor.
            **Not included:** system-wide hotkey/UIA, macOS templates/taxonomy.
          files: |
            dist/BiSpell-win-x64.zip
            dist/${{ needs.build-windows-x64.outputs.package_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
